version: '3.8'

services:
  # Backend
  backend:

    build: ./backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    command: >
     sh -c "python manage.py migrate &&
            python manage.py runserver 0.0.0.0:8000"


  # Frontend
  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "4200:4200"
    depends_on:
      - backend

volumes:
  postgres_data: